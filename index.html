<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fff6e9">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2252%22 x=%2250%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 font-size=%2248%22>🐾</text></svg>">
  <title>Muse by Le Bus des Toutous — Private care assistant</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="media.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <a class="brand" href="#dashboard" data-route="dashboard" aria-label="Muse home">
        <span class="brand-mark" aria-hidden="true">M<span>✦</span></span>
        <span class="brand-copy"><strong>Muse</strong><small>Le Bus des Toutous</small></span>
      </a>
      <nav id="main-nav">
        <button class="nav-item active" data-page="dashboard"><span>⌂</span><b data-i18n="Today">Today</b></button>
        <button class="nav-item" data-page="dogs"><span>♡</span><b data-i18n="Dogs">Dogs</b></button>
        <button class="nav-item" data-page="capture"><span>＋</span><b data-i18n="Capture">Capture</b></button>
        <button class="nav-item" data-page="gallery"><span>▦</span><b data-i18n="Gallery">Gallery</b></button>
        <button class="nav-item" data-page="story"><span>✦</span><b data-i18n="Daily story">Daily story</b></button>
        <button class="nav-item" data-page="invite"><span>↗</span><b data-i18n="Invite">Invite</b></button>
        <button class="nav-item" data-page="handoff"><span>⇄</span><b>Handoff</b></button>
        <button class="nav-item" data-page="schedule"><span>□</span><b data-i18n="Schedule">Schedule</b></button>
        <button class="nav-item" data-page="business"><span>↗</span><b data-i18n="Business">Business</b></button>
      </nav>
      <div class="sidebar-foot">
        <button class="nav-item" data-page="settings"><span>⚙</span><b data-i18n="Settings">Settings</b></button>
        <div class="user-chip"><div class="avatar human">AS</div><div><strong>Adine-Sophie</strong><small>Le Bus des Toutous</small></div></div>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <button class="mobile-menu" id="mobile-menu" aria-label="Open navigation">☰</button>
        <div><p class="eyebrow" id="page-eyebrow">SUNDAY · 12 JULY</p><h1 id="page-title">Good morning, Adine-Sophie</h1></div>
        <div class="top-actions"><button class="secondary compact" data-go="invite" data-i18n="Invite">Invite</button><select id="language-picker" aria-label="Language"><option value="en">EN</option><option value="fr">FR</option><option value="it">IT</option><option value="de">DE</option><option value="es">ES</option></select><span class="status-pill"><i></i> <span data-i18n="All systems calm">All systems calm</span></span><button class="icon-button" aria-label="Notifications">♢<b>2</b></button><button class="primary compact" data-go="capture">＋ <span data-i18n="Capture update">Capture update</span></button></div>
      </header>
      <section id="app-content" class="content" aria-live="polite"></section>
    </main>
  </div>
  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
